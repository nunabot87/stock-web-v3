# HTTP - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name stock.web.id;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stock.web.id;

    root /var/www/stock.web.id;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/stock.web.id-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stock.web.id-0001/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API routes - proxy to FastAPI
    location ~ ^/(api|ws)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }
    
    # Auth routes - proxy to FastAPI
    location /auth/ {
        proxy_pass http://127.0.0.1:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }
    
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location /static/ {
        alias /var/www/stock.web.id/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location = / {
        try_files /index.html =404;
    }
    
    location /dashboard/ {
        alias /var/www/stock.web.id/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }
    
    # Stock detail page - IMPORTANT: catch-all for /stock/anything
    location ~ ^/stock/(.*)$ {
        try_files /stock/index.html =404;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}